name: Legacy CRX regression

on:
  push:
    branches:
      - main
      - release-*
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Three times a day in UTC+8: 02:00, 10:00, 18:00.
    - cron: '0 18,2,10 * * *'

concurrency:
  group: legacy-crx-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  legacy-crx-regression:
    name: Legacy CRX regression
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium dependencies
        run: npm run test:install

      - name: Build CRX package, recorder example, and tests
        run: |
          npm run ci:pw:bundles
          npm run build:crx
          npm run build:examples:recorder
          npm run build:tests
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"

      - name: Run legacy CRX regression
        run: npm run test:crx:legacy-core -- --reporter=line --global-timeout=1200000

      - name: Upload recorder extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: recorder-crx
          path: |
            examples/recorder-crx/dist/
          retention-days: 5

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-crx-playwright-artifacts
          path: |
            tests/playwright-report/
            tests/test-results/
          if-no-files-found: ignore
          retention-days: 5
