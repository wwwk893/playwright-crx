name: Business Flow E2E

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Three times a day in UTC+8: 02:00, 10:00, 18:00.
    - cron: '0 18,2,10 * * *'

concurrency:
  group: business-flow-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  business-flow-e2e:
    name: Business Flow E2E + human-like
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium dependencies
        run: npm run test:install

      - name: Build CRX package, recorder example, and tests
        run: |
          npm run ci:pw:bundles
          npm run build:crx
          npm run build:examples:recorder
          npm run build:tests
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"

      - name: L1 flow/unit/codegen/recipe contract tests
        run: npm run test:crx:business-flow:l1

      - name: L2 deterministic CRX generated replay tests
        run: npm run test:crx:business-flow:l2 -- --reporter=line --global-timeout=1200000

      - name: L3 human-like CRX smoke tests
        run: npm run test:crx:business-flow:l3 -- --reporter=line --global-timeout=1200000

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: business-flow-e2e-artifacts
          path: |
            tests/playwright-report
            tests/test-results
            tests/.raw-generated-replay
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7
